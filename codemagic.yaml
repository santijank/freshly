workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        KP1: "gsk_aQXLicCriiRyeM"
        KP2: "Hg1nAaWGdyb3FY0sPS"
        KP3: "DyIb2TrEwNOjJ0JoHnso"
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Add Android platform
        script: |
          flutter create . --platforms android
      - name: Inject API key
        script: |
          python3 - <<'PYEOF'
          import os, glob
          key = os.environ.get('KP1','') + os.environ.get('KP2','') + os.environ.get('KP3','')
          if len(key) < 20:
              print("ERROR: key parts missing!")
              exit(1)
          count = 0
          for f in glob.glob('lib/**/*.dart', recursive=True):
              with open(f, 'r') as fh:
                  content = fh.read()
              if '__GROQ_API_KEY__' in content:
                  with open(f, 'w') as fh:
                      fh.write(content.replace('__GROQ_API_KEY__', key))
                  print(f'Injected: {f}')
                  count += 1
          print(f'Done — {count} file(s) updated')
          PYEOF
      - name: Build APK
        script: flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - ticallcenter@gmail.com
        notify:
          success: true
          failure: true
