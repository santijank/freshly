workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Add Android platform
        script: |
          flutter create . --platforms android
      - name: Inject API key
        script: |
          find lib -name "*.dart" -exec sed -i "s/__GROQ_API_KEY__/$GROQ_API_KEY/g" {} \;
      - name: Build APK
        script: flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - ticallcenter@gmail.com
        notify:
          success: true
          failure: true
