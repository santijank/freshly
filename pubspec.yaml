name: freshly
description: A minimal eco-friendly food freshness tracker app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  permission_handler: ^11.3.0
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1
  http: ^1.2.1
  speech_to_text: ^6.6.2
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets: []
